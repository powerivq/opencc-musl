name: release

on:
  workflow_dispatch:
    inputs:
      opencc_version:
        description: OpenCC version without the ver. prefix
        default: 1.3.1
        required: true
      opencc_ref:
        description: OpenCC git ref, tag, branch, or SHA. Defaults to ver.<version>
        default: ''
        required: false
      release_tag:
        description: Release tag to upload artifacts to
        default: 1.3.1
        required: true
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Resolve OpenCC inputs
        id: vars
        shell: bash
        run: |
          version='${{ github.event.inputs.opencc_version || '1.3.1' }}'
          ref='${{ github.event.inputs.opencc_ref }}'
          if [ -z "$ref" ]; then ref="ver.${version}"; fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
      - name: Build artifact rootfs
        uses: docker/build-push-action@v7
        with:
          context: .
          target: artifact
          platforms: ${{ matrix.platform }}
          outputs: type=local,dest=dist/rootfs-${{ matrix.arch }}
          build-args: |
            OPENCC_VERSION=${{ steps.vars.outputs.version }}
            OPENCC_REF=${{ steps.vars.outputs.ref }}
      - name: Pack tarball
        run: |
          set -eux
          version='${{ steps.vars.outputs.version }}'
          name="opencc-${version}-alpine-${{ matrix.arch }}.tar.gz"
          mkdir -p dist/artifacts
          tar -C "dist/rootfs-${{ matrix.arch }}" -czf "dist/artifacts/${name}" .
          sha256sum "dist/artifacts/${name}" > "dist/artifacts/${name}.sha256"
      - name: Test runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          platforms: ${{ matrix.platform }}
          build-args: |
            OPENCC_VERSION=${{ steps.vars.outputs.version }}
            OPENCC_REF=${{ steps.vars.outputs.ref }}
          push: false
      - uses: actions/upload-artifact@v4
        with:
          name: opencc-${{ matrix.arch }}
          path: dist/artifacts/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/all
          merge-multiple: true
      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: dist/all/*
