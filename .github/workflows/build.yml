name: Build and push Docker container

on:
  push:
    branches:
      - main
  schedule:
    - cron: '35 12 1 * *'
  workflow_dispatch:
    inputs:
      opencc_version:
        description: OpenCC version without the ver. prefix
        default: 1.3.1
        required: true
      opencc_ref:
        description: OpenCC git ref, tag, branch, or SHA. Defaults to ver.<version>
        default: ''
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve OpenCC inputs
        id: vars
        shell: bash
        run: |
          version='${{ github.event.inputs.opencc_version || '1.3.1' }}'
          ref='${{ github.event.inputs.opencc_ref }}'
          if [ -z "$ref" ]; then ref="ver.${version}"; fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/powerivq/opencc-musl:latest
            ghcr.io/powerivq/opencc-musl:${{ steps.vars.outputs.version }}
          build-args: |
            OPENCC_VERSION=${{ steps.vars.outputs.version }}
            OPENCC_REF=${{ steps.vars.outputs.ref }}
